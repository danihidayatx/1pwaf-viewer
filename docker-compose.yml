services:
  waf-viewer:
    build: .
    container_name: 1pwaf-viewer
    env_file:
      - .env
    ports:
      - "${APP_PORT:-5000}:${APP_PORT:-5000}"
    environment:
      - WAF_DATA_DIR=/waf_data
    volumes:
      - ${WAF_DATA_DIR:-/opt/1panel/apps/openresty/openresty/1pwaf/data}:/waf_data:ro
    restart: unless-stopped
